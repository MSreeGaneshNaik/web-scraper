<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Scraper</title>
<style>
  /* ---- Claude colour palette ---- */
  :root {
    --bg:        #F5F4EE;   /* warm cream */
    --bg-2:      #EDE9DD;
    --card:      #FBFAF6;
    --card-2:    #FFFFFF;
    --border:    #E3DECF;
    --text:      #211F1A;   /* dark warm */
    --muted:     #6F6A5C;
    --faint:     #9A9485;
    --accent:    #CC785C;   /* Claude terracotta */
    --accent-2:  #D9A38A;
    --accent-deep:#B5613F;
    --shadow:    0 1px 2px rgba(40,30,20,.04), 0 8px 24px rgba(40,30,20,.06);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Styrene B", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    overflow-x: hidden;
  }

  /* ---- Smooth animated background ---- */
  .bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; background: var(--bg); }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: .55;
    will-change: transform;
  }
  .blob.b1 { width: 46vw; height: 46vw; left: -8vw;  top: -10vw;
             background: radial-gradient(circle at 30% 30%, var(--accent-2), transparent 70%);
             animation: drift1 26s ease-in-out infinite; }
  .blob.b2 { width: 40vw; height: 40vw; right: -6vw; top: 8vw;
             background: radial-gradient(circle at 50% 50%, #E7C8A0, transparent 70%);
             animation: drift2 32s ease-in-out infinite; }
  .blob.b3 { width: 48vw; height: 48vw; left: 18vw; bottom: -18vw;
             background: radial-gradient(circle at 50% 50%, var(--accent), transparent 72%);
             opacity: .32; animation: drift3 38s ease-in-out infinite; }
  .blob.b4 { width: 34vw; height: 34vw; right: 12vw; bottom: -6vw;
             background: radial-gradient(circle at 50% 50%, #F0D5B8, transparent 70%);
             opacity: .42; animation: drift4 29s ease-in-out infinite; }
  .blob.b5 { width: 30vw; height: 30vw; left: 30vw; top: 22vw;
             background: radial-gradient(circle at 50% 50%, var(--accent-2), transparent 70%);
             opacity: .3; animation: drift5 44s ease-in-out infinite; }
  .bg::after { content: ""; position: absolute; inset: -20%;
             background: conic-gradient(from 0deg, transparent, rgba(204,120,92,.06), transparent 40%);
             animation: spinbg 60s linear infinite; }
  @keyframes drift1 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%     { transform: translate(6vw, 4vw) scale(1.12); }
    66%     { transform: translate(3vw, 8vw) scale(.96); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%     { transform: translate(-5vw, 6vw) scale(1.08); }
    66%     { transform: translate(-8vw, 2vw) scale(1.16); }
  }
  @keyframes drift3 {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(4vw, -5vw) scale(1.15); }
  }
  @keyframes drift4 {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(-6vw, -4vw) scale(1.1); }
  }
  @keyframes drift5 {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(7vw, 5vw) scale(1.2); }
  }
  @keyframes spinbg { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .blob, .bg::after { animation: none; } }

  /* ---- Layout ---- */
  .wrap { max-width: 860px; margin: 0 auto; padding: 64px 22px 96px; }
  .brand { display: flex; align-items: center; gap: 11px; margin-bottom: 6px; }
  .dot { width: 13px; height: 13px; border-radius: 50%; background: var(--accent);
         box-shadow: 0 0 0 4px rgba(204,120,92,.16); }
  h1 { font-family: Georgia, "Tiempos", "Times New Roman", serif;
       font-size: 34px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
  .sub { color: var(--muted); margin: 6px 0 30px; font-size: 16px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(6px);
  }
  .row { display: flex; gap: 10px; }
  input[type="text"] {
    flex: 1; background: var(--card-2); border: 1px solid var(--border);
    color: var(--text); padding: 14px 16px; border-radius: 11px;
    font-size: 15px; outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input[type="text"]::placeholder { color: var(--faint); }
  input[type="text"]:focus { border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(204,120,92,.15); }
  button.go {
    background: var(--accent); color: #fff; border: none;
    padding: 14px 26px; border-radius: 11px; font-size: 15px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: background .2s, transform .08s;
  }
  button.go:hover { background: var(--accent-deep); }
  button.go:active { transform: translateY(1px); }
  button.go:disabled { opacity: .55; cursor: not-allowed; }
  button.stop {
    background: transparent; color: #b3402a; border: 1px solid #d98a78;
    padding: 14px 22px; border-radius: 11px; font-size: 15px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: background .2s, transform .08s;
  }
  button.stop:hover { background: rgba(179,64,42,.08); }
  button.stop:active { transform: translateY(1px); }
  button.stop:disabled { opacity: .55; cursor: not-allowed; }

  .opts { display: flex; flex-wrap: wrap; gap: 18px; align-items: center;
          margin-top: 16px; font-size: 14px; color: var(--muted); }
  .opts label { display: flex; align-items: center; gap: 7px; }
  .opts input[type="number"] {
    width: 72px; background: var(--card-2); border: 1px solid var(--border);
    color: var(--text); padding: 7px 9px; border-radius: 8px; font-size: 14px; outline: none; }
  .opts input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }

  #status { margin-top: 18px; color: var(--muted); font-size: 14px; min-height: 20px; }

  /* Progress bar */
  .progress { margin-top: 16px; transition: opacity .5s; }
  .progress.fade { opacity: 0; }
  .bar { height: 10px; background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 999px; overflow: hidden; }
  .fill { height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent-2), var(--accent), var(--accent-deep));
    background-size: 200% 100%; border-radius: 999px;
    transition: width .4s ease; animation: shimmer 1.4s linear infinite; }
  @keyframes shimmer { 0% { background-position: 0% 0; } 100% { background-position: -200% 0; } }
  /* Indeterminate: a block that slides while the page count is unknown */
  .fill.indet { width: 35%; animation: slide 1.1s ease-in-out infinite, shimmer 1.4s linear infinite; }
  @keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
  .ptext { margin-top: 8px; font-size: 13px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spinner { display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #b3402a; }

  /* ---- Results ---- */
  /* Results break out of the centered column to use 80% of the page width. */
  #results { margin-top: 30px; animation: rise .5s ease both;
    width: 80vw; position: relative; left: 50%; margin-left: -40vw; }
  @media (max-width: 1000px) {
    #results { width: auto; left: auto; margin-left: 0; }
  }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--faint); margin: 26px 2px 12px; font-weight: 600; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px,1fr)); gap: 12px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 13px;
    padding: 16px; box-shadow: var(--shadow); }
  .stat .n { font-size: 24px; font-weight: 700; color: var(--accent-deep);
    font-family: Georgia, serif; }
  .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

  .downloads { display: flex; gap: 10px; margin-top: 14px; }
  .downloads a { text-decoration: none; }
  .btn-sec { background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: border-color .2s, background .2s; }
  .btn-sec:hover { border-color: var(--accent); background: rgba(204,120,92,.06); }

  .page { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; margin-bottom: 13px; box-shadow: var(--shadow);
    transition: transform .15s, box-shadow .15s; }
  .page:hover { transform: translateY(-2px);
    box-shadow: 0 2px 4px rgba(40,30,20,.05), 0 14px 30px rgba(40,30,20,.09); }
  /* Per-page results: user-selectable column layout (rows as needed). */
  #pages { display: grid; gap: 13px; align-items: start; grid-template-columns: 1fr; }
  #pages.cols-2 { grid-template-columns: repeat(2, 1fr); }
  #pages.cols-3 { grid-template-columns: repeat(3, 1fr); }
  #pages .page { margin-bottom: 0; }
  @media (max-width: 640px) {
    #pages.cols-2, #pages.cols-3 { grid-template-columns: 1fr; }
  }

  /* Section header with a layout toggle on the right. */
  .section-head { display: flex; align-items: center; justify-content: space-between;
    margin: 26px 2px 12px; }
  .section-head .section-title { margin: 0; }
  .layout-toggle { display: flex; gap: 4px; background: var(--card);
    border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
  .layout-toggle button { background: transparent; border: none; color: var(--muted);
    font-size: 12.5px; font-weight: 600; padding: 5px 11px; border-radius: 6px;
    cursor: pointer; transition: background .15s, color .15s; }
  .layout-toggle button:hover { color: var(--text); }
  .layout-toggle button.active { background: var(--accent); color: #fff; }
  .page .idx { color: var(--faint); font-size: 13px; font-weight: 600; }
  .page h3 { margin: 2px 0 4px; font-size: 17px; font-weight: 600;
    font-family: Georgia, serif; }
  .page a.u { color: var(--accent-deep); font-size: 13px; text-decoration: none; word-break: break-all; }
  .page a.u:hover { text-decoration: underline; }
  .page .desc { color: var(--muted); font-size: 14px; margin: 10px 0 0; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 0; }
  .chip { background: var(--bg-2); border: 1px solid var(--border); color: var(--muted);
    font-size: 12px; padding: 3px 9px; border-radius: 999px; }
  .chip.metric { background: rgba(204,120,92,.10); border-color: rgba(204,120,92,.25);
    color: var(--accent-deep); font-weight: 600; }

  .preview { color: var(--muted); font-size: 13.5px; line-height: 1.6;
    border-left: 3px solid var(--accent-2); padding: 2px 0 2px 13px; margin-top: 13px; }
  .emails-card { background: rgba(204,120,92,.07); border-color: rgba(204,120,92,.3); }

  /* Accordion / catalog */
  .acc { margin-top: 10px; border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; background: var(--card-2); }
  .acc summary { cursor: pointer; padding: 10px 14px; font-size: 14px; font-weight: 600;
    list-style: none; user-select: none; display: flex; align-items: center; gap: 8px;
    text-transform: capitalize; }
  .acc summary::-webkit-details-marker { display: none; }
  .acc summary::before { content: "▸"; color: var(--accent); transition: transform .2s; }
  .acc[open] summary::before { transform: rotate(90deg); }
  .acc summary .count { background: rgba(204,120,92,.12); color: var(--accent-deep);
    font-size: 12px; padding: 1px 8px; border-radius: 999px; }
  .acc-body { padding: 4px 14px 14px; display: flex; flex-direction: column; gap: 4px; }
  .reslink { color: var(--accent-deep); font-size: 13px; text-decoration: none; word-break: break-all; }
  .reslink:hover { text-decoration: underline; }
  .muted { color: var(--faint); font-size: 12.5px; }
  pre.robots { background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; font-size: 12.5px; line-height: 1.5; overflow-x: auto;
    white-space: pre-wrap; word-break: break-word; margin: 10px 0 0; color: var(--text); }

  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
    gap: 10px; margin-top: 12px; }
  .shot { width: 100%; height: 120px; object-fit: cover; object-position: top;
    border: 1px solid var(--border); border-radius: 8px; cursor: zoom-in;
    transition: transform .15s; background: #fff; }
  .shot:hover { transform: scale(1.03); border-color: var(--accent); }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div><div class="blob b5"></div></div>

<div class="wrap">
  <div class="brand"><span class="dot"></span><h1>Web Scraper</h1></div>
  <p class="sub">Give it a link. It crawls the site and lays out everything it finds — clearly.</p>

  <div class="card">
    <div class="row">
      <input type="text" id="url" placeholder="https://example.com" autofocus>
      <button class="go" id="go">Scrape</button>
      <button class="stop hidden" id="stop">Stop</button>
    </div>
    <div class="opts">
      <label>Max pages <input type="number" id="maxPages" value="50" min="1" max="2000"></label>
      <label><input type="checkbox" id="allPages"> All pages</label>
      <label>Parallel <input type="number" id="workers" value="8" min="1" max="32"></label>
      <label>Delay (s) <input type="number" id="delay" value="0" min="0" step="0.1"></label>
      <label><input type="checkbox" id="crawl" checked> Crawl site</label>
      <label><input type="checkbox" id="ignoreRobots"> Ignore robots.txt</label>
      <label><input type="checkbox" id="render"> Render JS (browser)</label>
      <label><input type="checkbox" id="screenshots"> Screenshots</label>
    </div>
    <div id="status"></div>
    <div id="progress" class="progress hidden">
      <div class="bar"><div class="fill" id="bar"></div></div>
      <div class="ptext" id="ptext"></div>
    </div>
  </div>

  <div id="results" class="hidden">
    <div class="section-title" id="overviewTitle">Overview</div>
    <div class="stats" id="stats"></div>
    <div class="downloads">
      <a href="/download/json"><button class="btn-sec">⬇ Download JSON</button></a>
      <a href="/download/report"><button class="btn-sec">⬇ Download Report</button></a>
      <a href="/download/contacts" id="dlContacts"><button class="btn-sec">⬇ Contacts (CSV)</button></a>
    </div>
    <div id="extras"></div>
    <div class="section-head">
      <div class="section-title">Pages</div>
      <div class="layout-toggle" id="layoutToggle">
        <button data-cols="1">List</button>
        <button data-cols="2">2 cols</button>
        <button data-cols="3">3 cols</button>
      </div>
    </div>
    <div id="pages" class="cols-2"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const goBtn = $("go");
const stopBtn = $("stop");

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function num(n){return (n||0).toLocaleString();}

function setRunning(running){
  goBtn.classList.toggle("hidden", running);
  stopBtn.classList.toggle("hidden", !running);
  stopBtn.disabled=false;
  goBtn.disabled=running;
}

function showProgress(show){
  const p=$("progress");
  if(show){ p.classList.remove("hidden","fade"); setBar(0,0,"Starting…"); }
  else { p.classList.add("fade"); setTimeout(()=>p.classList.add("hidden"),500); }
}
function setBar(done,total,current){
  const fill=$("bar");
  if(total>0){
    // Known page count: show a real percentage.
    fill.classList.remove("indet");
    fill.style.width=Math.min(100,Math.round(done/total*100))+"%";
    $("ptext").textContent="Crawled "+num(done)+" / "+num(total)+" pages"+
      (current&&current!=="done"?" — "+current:"");
  } else {
    // Page count not known yet: indeterminate sliding bar.
    fill.classList.add("indet");
    fill.style.width="";
    $("ptext").textContent=current||"Working…";
  }
}

async function scrape(){
  const url=$("url").value.trim();
  if(!url){$("status").textContent="Please enter a URL.";return;}
  setRunning(true);
  $("results").classList.add("hidden");
  $("status").innerHTML='<span class="spinner"></span> Crawling…';
  showProgress(true);

  // "All pages" overrides the numeric limit with a very high cap.
  const allPages=$("allPages").checked;
  const maxPages= allPages ? 100000 : (parseInt($("maxPages").value)||50);

  try{
    const res=await fetch("/api/scrape",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        url,
        max_pages:maxPages,
        delay:parseFloat($("delay").value)||0,
        workers:parseInt($("workers").value)||8,
        crawl:$("crawl").checked,
        ignore_robots:$("ignoreRobots").checked,
        render:$("render").checked,
        screenshots:$("screenshots").checked,
      }),
    });
    const start=await res.json();
    if(start.error){
      $("status").innerHTML='<span class="err">'+esc(start.error)+'</span>';
      showProgress(false); setRunning(false); return;
    }
    poll();
  }catch(e){
    $("status").innerHTML='<span class="err">Request failed: '+esc(String(e))+'</span>';
    showProgress(false); setRunning(false);
  }
}

async function stopScrape(){
  stopBtn.disabled=true;
  $("status").innerHTML='<span class="spinner"></span> Stopping… keeping what was scraped so far';
  try{ await fetch("/api/stop",{method:"POST"}); }catch(e){}
}

async function poll(){
  try{
    const p=await (await fetch("/api/progress")).json();
    setBar(p.done, p.total, p.current);
    if(p.running){ setTimeout(poll,400); return; }

    // Finished (either naturally or stopped by the user).
    setRunning(false);
    if(p.error){
      $("status").innerHTML='<span class="err">'+esc(p.error)+'</span>';
      showProgress(false); return;
    }
    setBar(p.summary.pages_scraped,p.summary.pages_scraped,"done");  // fill to 100%
    setTimeout(()=>showProgress(false),600);   // then disappears
    $("status").innerHTML = p.stopped
      ? '<span style="color:var(--accent-deep)">⏹ Stopped early — showing the '
        + num(p.summary.pages_scraped) + ' pages scraped so far.</span>'
      : "";
    render(p.summary);
  }catch(e){
    $("status").innerHTML='<span class="err">Lost connection: '+esc(String(e))+'</span>';
    showProgress(false); setRunning(false);
  }
}

function stat(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}

function render(d){
  $("overviewTitle").textContent="Overview · "+esc(d.domain);
  $("stats").innerHTML=
    stat(num(d.pages_scraped),"Pages")+
    stat(num(d.total_words),"Words")+
    stat(num(d.unique_links),"Links")+
    stat(num(d.external_links),"External")+
    stat(num(d.unique_images),"Images")+
    stat(num(d.resource_total||0),"Files")+
    stat(num(d.errors),"Errors");

  // Contacts CSV button: label with count, hide if none.
  const dl=$("dlContacts");
  if(d.contacts_count>0){
    dl.style.display="";
    dl.querySelector("button").textContent="⬇ Contacts CSV ("+num(d.contacts_count)+")";
  } else {
    dl.style.display="none";
  }

  let extras="";

  // Site profile: tech stack + social profiles + contact emails.
  if((d.tech&&d.tech.length)||(d.social&&Object.keys(d.social).length)||(d.emails&&d.emails.length)){
    let b='';
    if(d.tech&&d.tech.length)
      b+='<div class="muted" style="margin-top:8px">Tech stack</div><div class="chips">'+
         d.tech.map(t=>'<span class="chip metric">'+esc(t)+'</span>').join('')+'</div>';
    if(d.social&&Object.keys(d.social).length)
      b+='<div class="muted" style="margin-top:10px">Social profiles</div><div class="chips">'+
         Object.entries(d.social).map(([k,v])=>'<a class="chip" style="text-decoration:none" href="'+esc(v)+'" target="_blank" rel="noopener">'+esc(k)+'</a>').join('')+'</div>';
    if(d.emails&&d.emails.length)
      b+='<div class="muted" style="margin-top:10px">Emails</div><div class="chips">'+
         d.emails.map(e=>'<span class="chip">✉ '+esc(e)+'</span>').join('')+'</div>';
    extras+='<div class="page"><div class="idx">Profile</div><h3>Site profile</h3>'+b+'</div>';
  }

  // Screenshots gallery (when rendering with screenshots).
  if(d.screenshots && d.screenshots.length){
    const shots=d.screenshots.map(s=>'<a href="/screenshot/'+s.index+'" target="_blank" rel="noopener"><img class="shot" src="/screenshot/'+s.index+'" title="'+esc(s.url)+'"></a>').join('');
    extras+='<div class="page"><div class="idx">Screenshots</div><h3>Page screenshots ('+d.screenshots.length+')</h3><div class="gallery">'+shots+'</div></div>';
  }

  // Document text extracted (PDF/Word/Excel).
  if(d.documents && d.documents.length){
    let body='';
    for(const doc of d.documents){
      body+='<details class="acc"><summary>'+esc(doc.url.split("/").pop())+' <span class="count">'+num(doc.chars)+' chars</span></summary>'+
            '<div class="acc-body"><a class="reslink" href="'+esc(doc.url)+'" target="_blank" rel="noopener">'+esc(doc.url)+'</a><div class="preview">'+esc(doc.preview)+'…</div></div></details>';
    }
    extras+='<div class="page"><div class="idx">Documents</div><h3>Document text ('+d.documents.length+')</h3>'+body+'</div>';
  }

  // Files & resources catalog, grouped by category.
  if(d.resources && Object.keys(d.resources).length){
    let body='';
    for(const [cat,urls] of Object.entries(d.resources)){
      body+='<details class="acc"><summary>'+esc(cat)+' <span class="count">'+urls.length+'</span></summary><div class="acc-body">';
      body+=urls.slice(0,200).map(u=>'<a class="reslink" href="'+esc(u)+'" target="_blank" rel="noopener">'+esc(u)+'</a>').join('');
      if(urls.length>200) body+='<div class="muted">…and '+(urls.length-200)+' more (in the JSON)</div>';
      body+='</div></details>';
    }
    extras+='<div class="page"><div class="idx">Catalog</div><h3>Files &amp; resources ('+num(d.resource_total)+')</h3>'+body+'</div>';
  }

  // Text files captured (robots.txt, .txt, .xml, .json…).
  if(d.text_files && d.text_files.length){
    const items=d.text_files.map(t=>'<a class="reslink" href="'+esc(t.url)+'" target="_blank" rel="noopener">'+esc(t.url)+'</a> <span class="muted">('+esc(t.content_type)+', '+num(t.size)+' bytes)</span>').join('');
    extras+='<div class="page"><div class="idx">Captured</div><h3>Text files ('+d.text_files.length+')</h3><div class="acc-body">'+items+'</div></div>';
  }

  // Sitemaps discovered.
  if(d.sitemaps && d.sitemaps.length){
    const items=d.sitemaps.map(s=>'<a class="reslink" href="'+esc(s.url)+'" target="_blank" rel="noopener">'+esc(s.url)+'</a> <span class="muted">('+num(s.url_count)+' URLs)</span>').join('');
    extras+='<div class="page"><div class="idx">Discovery</div><h3>Sitemaps</h3><div class="acc-body">'+items+'</div></div>';
  }

  // robots.txt, shown raw and collapsed.
  if(d.robots_txt){
    extras+='<div class="page"><div class="idx">Rules</div><h3>robots.txt</h3>'+
            '<details class="acc"><summary>view contents <span class="count">'+d.robots_txt.split("\\n").length+' lines</span></summary>'+
            '<pre class="robots">'+esc(d.robots_txt)+'</pre></details></div>';
  }

  $("extras").innerHTML=extras;

  // Per-page cards.
  let html="";
  d.pages.forEach((p,i)=>{
    html+='<div class="page">';
    html+='<div class="idx">Page '+(i+1)+' · status '+p.status+'</div>';
    html+='<h3>'+esc(p.title||"(no title)")+'</h3>';
    html+='<a class="u" href="'+esc(p.url)+'" target="_blank" rel="noopener">'+esc(p.url)+'</a>';
    if(p.description) html+='<p class="desc">'+esc(p.description)+'</p>';

    // Clear metric chips.
    html+='<div class="chips">';
    if(p.rendered) html+='<span class="chip metric">⚡ JS rendered</span>';
    html+='<span class="chip metric">'+num(p.words)+' words</span>';
    html+='<span class="chip metric">'+num(p.links)+' links</span>';
    html+='<span class="chip metric">'+num(p.images)+' images</span>';
    if(p.tables) html+='<span class="chip metric">'+num(p.tables)+' tables</span>';
    if(p.forms) html+='<span class="chip metric">'+num(p.forms)+' forms</span>';
    if(p.api_calls) html+='<span class="chip metric">'+num(p.api_calls)+' API calls</span>';
    html+='</div>';

    // Headings give a clear sense of page structure.
    if((p.h1&&p.h1.length)||(p.h2&&p.h2.length)){
      html+='<div class="chips">';
      (p.h1||[]).forEach(h=>html+='<span class="chip">H1 · '+esc(h)+'</span>');
      (p.h2||[]).forEach(h=>html+='<span class="chip">'+esc(h)+'</span>');
      html+='</div>';
    }
    if(p.tech&&p.tech.length)
      html+='<div class="chips">'+p.tech.map(t=>'<span class="chip">🛠 '+esc(t)+'</span>').join('')+'</div>';
    if(p.keywords&&p.keywords.length)
      html+='<div class="chips">'+p.keywords.map(k=>'<span class="chip">'+esc(k)+'</span>').join('')+'</div>';
    if(p.social&&Object.keys(p.social).length)
      html+='<div class="chips">'+Object.entries(p.social).map(([k,v])=>'<a class="chip" style="text-decoration:none" href="'+esc(v)+'" target="_blank" rel="noopener">'+esc(k)+'</a>').join('')+'</div>';
    if(p.emails&&p.emails.length)
      html+='<div class="chips">'+p.emails.map(e=>'<span class="chip">✉ '+esc(e)+'</span>').join('')+'</div>';
    if(p.preview) html+='<div class="preview">'+esc(p.preview)+'…</div>';
    html+='</div>';
  });
  $("pages").innerHTML=html;
  $("results").classList.remove("hidden");
}

goBtn.addEventListener("click",scrape);
stopBtn.addEventListener("click",stopScrape);
$("url").addEventListener("keydown",e=>{if(e.key==="Enter")scrape();});
$("allPages").addEventListener("change",e=>{ $("maxPages").disabled=e.target.checked; });

// Page-layout toggle (List / 2 cols / 3 cols), remembered across runs.
function setLayout(cols){
  $("pages").className = "cols-" + cols;
  document.querySelectorAll("#layoutToggle button").forEach(b=>
    b.classList.toggle("active", b.dataset.cols === String(cols)));
  try{ localStorage.setItem("pagesCols", cols); }catch(e){}
}
document.querySelectorAll("#layoutToggle button").forEach(b=>
  b.addEventListener("click", ()=>setLayout(b.dataset.cols)));
setLayout((()=>{ try{ return localStorage.getItem("pagesCols") || "2"; }catch(e){ return "2"; } })());
</script>
</body>
</html>
